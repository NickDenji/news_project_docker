<!DOCTYPE html>
<html>
<head>
    <title>Edit Newsletter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2>Edit Newsletter</h2>

    <form method="post">
        {% csrf_token %}

        <label>Title</label>
        <input name="title" class="form-control mb-2" value="{{ newsletter.title }}">

        <label>Description</label>
        <textarea name="description" class="form-control mb-3">{{ newsletter.description }}</textarea>

        <h4>Articles</h4>

        {% for article in articles %}
            <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       name="articles"
                       value="{{ article.id }}"
                       {% if article in newsletter.articles.all %}checked{% endif %}>
                
                <label class="form-check-label">
                    {{ article.title }}
                </label>
            </div>
        {% endfor %}

        <button class="btn btn-warning mt-3">Update Newsletter</button>
    </form>

    <a href="/newsletters/" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
