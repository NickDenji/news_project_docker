<!DOCTYPE html>
<html>
<head>
    <title>{{ article.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1>{{ article.title }}</h1>

    <p class="mt-3">{{ article.content }}</p>

    <p class="text-muted">
        By {{ article.author }} | {{ article.created_at }}
    </p>

    <a href="/newsletters/" class="btn btn-secondary mt-3">
        Back to Newsletters
    </a>

</div>

</body>
</html>
